<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-edit {
            background: #ffc107;
            color: #333;
        }
        .btn-edit:hover {
            background: #e0a800;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 学生管理系统</h1>
        
        <div id="message" class="message"></div>
        
        <div class="form-section">
            <h3 style="margin-bottom: 15px;">添加/编辑学生</h3>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-row">
                    <input type="text" id="name" placeholder="姓名" required>
                    <input type="number" id="age" placeholder="年龄" min="1" max="150" required>
                </div>
                <div class="form-row">
                    <input type="email" id="email" placeholder="邮箱" required>
                    <input type="text" id="major" placeholder="专业" required>
                </div>
                <button type="submit" class="btn btn-primary">提交</button>
                <button type="button" class="btn" onclick="resetForm()" style="margin-left: 10px;">重置</button>
            </form>
        </div>
        
        <div>
            <h3 style="margin-bottom: 15px;">学生列表</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>年龄</th>
                        <th>邮箱</th>
                        <th>专业</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        
        // 加载学生列表
        async function loadStudents() {
            try {
                const response = await fetch(`${API_BASE}/students`);
                const students = await response.json();
                renderStudents(students);
            } catch (error) {
                showMessage('加载学生列表失败：' + error.message, 'error');
            }
        }
        
        // 渲染学生表格
        function renderStudents(students) {
            const tbody = document.getElementById('studentsTable');
            tbody.innerHTML = students.map(student => `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.age}</td>
                    <td>${student.email}</td>
                    <td>${student.major}</td>
                    <td class="actions">
                        <button class="btn btn-edit" onclick="editStudent(${student.id})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteStudent(${student.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 提交表单
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('studentId').value;
            const studentData = {
                name: document.getElementById('name').value,
                age: parseInt(document.getElementById('age').value),
                email: document.getElementById('email').value,
                major: document.getElementById('major').value
            };
            
            try {
                const url = id ? `${API_BASE}/students/${id}` : `${API_BASE}/students`;
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(studentData)
                });
                
                if (response.ok) {
                    showMessage(id ? '学生信息已更新' : '学生已添加', 'success');
                    resetForm();
                    loadStudents();
                } else {
                    const error = await response.json();
                    showMessage(error.detail || '操作失败', 'error');
                }
            } catch (error) {
                showMessage('操作失败：' + error.message, 'error');
            }
        });
        
        // 编辑学生
        async function editStudent(id) {
            try {
                const response = await fetch(`${API_BASE}/students/${id}`);
                const student = await response.json();
                
                document.getElementById('studentId').value = student.id;
                document.getElementById('name').value = student.name;
                document.getElementById('age').value = student.age;
                document.getElementById('email').value = student.email;
                document.getElementById('major').value = student.major;
            } catch (error) {
                showMessage('加载学生信息失败：' + error.message, 'error');
            }
        }
        
        // 删除学生
        async function deleteStudent(id) {
            if (!confirm('确定要删除这个学生吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/students/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showMessage('学生已删除', 'success');
                    loadStudents();
                } else {
                    const error = await response.json();
                    showMessage(error.detail || '删除失败', 'error');
                }
            } catch (error) {
                showMessage('删除失败：' + error.message, 'error');
            }
        }
        
        // 重置表单
        function resetForm() {
            document.getElementById('studentForm').reset();
            document.getElementById('studentId').value = '';
        }
        
        // 显示消息
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 3000);
        }
        
        // 页面加载时获取学生列表
        loadStudents();
    </script>
</body>
</html>
